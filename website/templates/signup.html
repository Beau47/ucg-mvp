<!DOCTYPE html>
<html>

<head>

    <title>Sign Up | Urban Coders Guild</title>

    <link rel="stylesheet" href="/static/css/dashboard.css">

</head>


<body>


<div class="container">


    <div class="card">

        <h1>
            Create Account
        </h1>


        <form action="/signup" method="POST">


            <p>
                Email
            </p>

            <input
                type="email"
                name="email"
                required
            >


            <p>
                Password
            </p>


            <input
                type="password"
                name="password"
                required
            >



            <br><br>


            <button type="submit">
                Sign Up
            </button>


        </form>


        <p>
            Already have an account?
            <a href="/login">
                Login
            </a>
        </p>


    </div>


</div>


</body>

</html>
