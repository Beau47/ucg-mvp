<!DOCTYPE html>
<html>

<head>

<title>
Forgot Password | Urban Coders Guild
</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>


<body>


<div class="auth-container">


<div class="card auth-card">


<h2>
Reset Password
</h2>


<p>
Enter your email and we will send you a password reset link.
</p>


{% if message %}

<div class="error">
{{ message }}
</div>

{% endif %}



<form method="POST">


<label>
Email Address
</label>


<input
class="input"
type="email"
name="email"
placeholder="Enter your email"
required
>


<button>
Send Reset Email
</button>


</form>



</div>


</div>


</body>

</html>
