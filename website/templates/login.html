<!DOCTYPE html>
<html>

<head>

    <title>Login | Urban Coders Guild</title>

    <link rel="stylesheet" href="/static/css/dashboard.css">

</head>


<body>


<div class="container">


    <div class="card">


        <h1>
            Welcome Back
        </h1>


        <form action="/login" method="POST">


            <p>
                Email
            </p>


            <input
                type="email"
                name="email"
                required
            >



            <p>
                Password
            </p>


            <input
                type="password"
                name="password"
                required
            >



            <br><br>


            <button type="submit">
                Login
            </button>


        </form>


        <p>
            Don't have an account?
            <a href="/signup">
                Sign Up
            </a>
        </p>


    </div>


</div>


</body>

</html>
