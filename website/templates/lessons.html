<!DOCTYPE html>
<html>

<head>

<title>Lessons</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>


<body>


<header class="topbar">

<div class="logo">
Urban Coders Guild
</div>


<nav class="nav-links">

<a href="/">
Dashboard
</a>

<a href="/lessons" class="active">
Lessons
</a>

<a href="/exercises">
Exercises
</a>

</nav>


</header>



<div class="page">


<main class="main" style="padding:40px; overflow-y:auto;">


<h1>
Lessons
</h1>



{% for lesson in lessons %}


<div class="lesson-card">


<p class="lesson-number">
{{ lesson.lesson_number }}
</p>


<h2>
{{ lesson.title }}
</h2>


<p>
{{ lesson.description }}
</p>



<a href="/lesson/{{ lesson.id }}">

<button>
Start Lesson →
</button>

</a>


</div>


{% endfor %}


</main>


</div>


</body>

</html>
