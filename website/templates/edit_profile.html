<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | Urban Coders Guild</title>

    <!-- Load Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Your CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

</head>


<body>

    <header class="topbar">

        <div class="logo">
            Urban Coders Guild
        </div>

        <nav>

            <a href="/" class="nav-item">
                Dashboard
            </a>

            <a href="/lessons" class="nav-item">
                Lessons
            </a>

            <a href="/exercises" class="nav-item">
                Dashboard
            </a>

            <a href="/profile" class="nav-item active">
                Profile
            </a>

        </nav>

    </header>


    <main class="profile-edit-page">

        <div class="page-header">

            <h1>
                Edit Profile
            </h1>

            <p>
                Update your username and profile picture.
            </p>

        </div>


        <div class="profile-edit-card">

            <div class="profile-picture-section">

                {% if profile.avatar_url %}

                    <img
                        src="{{ profile.avatar_url }}"
                        alt="Profile Picture"
                        class="profile-image"
                    >

                {% else %}

                    <div class="profile-image profile-placeholder">

                        {{ profile.username[0]|upper }}

                    </div>

                {% endif %}

            </div>


            <form
                method="POST"
                enctype="multipart/form-data"
                class="profile-form"
            >

                <div class="form-group">

                    <label for="username">
                        Username
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        value="{{ profile.username }}"
                        required
                    >

                </div>


                <div class="form-group">

                    <label for="avatar">
                        Profile Picture
                    </label>

                    <input
                        type="file"
                        id="avatar"
                        name="avatar"
                        accept="image/*"
                    >

                    <p class="form-help">
                        Choose a JPG, PNG, or other image file.
                    </p>

                </div>


                <div class="form-actions">

                    <a
                        href="/profile"
                        class="cancel-button"
                    >
                        Cancel
                    </a>

                    <button
                        type="submit"
                        class="save-button"
                    >
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </main>

</body>

</html>
