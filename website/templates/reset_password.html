<form id="reset-form">

<label>
New Password
</label>

<input
type="password"
id="password"
required
>


<button>
Change Password
</button>

</form>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>

const supabaseClient = supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_ANON_KEY"
);



document
.getElementById("reset-form")
.addEventListener(
"submit",
async(e)=>{


e.preventDefault();


const password =
document.getElementById("password").value;



const {error} =
await supabaseClient.auth.updateUser({

password: password

});


if(error){

alert(error.message);

}

else{

alert(
"Password updated!"
);

window.location.href="/login";

}


});


</script>
