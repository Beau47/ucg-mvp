<!DOCTYPE html>
<html>

<head>

<title>Exercises</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/css/style.css">

<link rel="icon" type="image/webp" href="/static/images/ucg_logo.webp">

</head>


<body>


<header class="topbar">

    <div class="logo">
        Urban Coders Guild
    </div>


    <nav class="nav-links">

        <a href="/" class="nav-item">
            Dashboard
        </a>

        <a href="/lessons" class="nav-item">
            Lessons
        </a>

        <a href="/exercises" class="nav-item active">
            Exercises
        </a>

        <a href="/profile" class="nav-item">
            Profile
        </a>

    </nav>

</header>



<div class="page">


<main class="main content-page">


<section class="page-header">

    <h1>
        Coding Exercises
    </h1>


    <p>
        Practice your skills with interactive coding challenges.
    </p>

</section>



<section class="card-grid">


{% for problem in problems.values() %}


<div class="content-card">


<div class="card-number">
    Exercise
</div>


<h2>
    {{ problem.title }}
</h2>


<p>
    {{ problem.description }}
</p>



<a href="/workspace/{{ problem.id }}">

<button>
Start Exercise →
</button>

</a>


</div>


{% endfor %}


</section>


</main>


</div>

<script>

function hasCompletedLesson05() {

    const progress =
        JSON.parse(
            localStorage.getItem(
                "ucg:lesson-progress:functions_preview:1"
            ) || "{}"
        );

    return (
        Array.isArray(progress.quizzes) &&
        progress.quizzes.length >= 2 &&
        progress.quizzes.every(Boolean)
    );

}


if (!hasCompletedLesson05()) {

    document.querySelector(".content-page").innerHTML = `
        <section class="page-header">
            <h1>Exercises Locked</h1>
            <p>Complete Lesson 0.5 to unlock coding exercises.</p>
        </section>

        <div class="content-card">
            <h2>Complete Lesson 0.5 to unlock</h2>
            <p>
                Lesson 0.5 explains how exercise functions work.
                Finish it first, then come back to start coding.
            </p>
            <a href="/lesson/functions_preview/1">
                <button>Go to Lesson 0.5 →</button>
            </a>
        </div>
    `;

}

</script>


</body>

</html>
